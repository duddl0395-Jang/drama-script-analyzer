<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scriptor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #141414; color: #e5e5e5; min-height: 100vh; }
    ::selection { background: #e50914; color: white; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #666; }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(20,20,20,0.95));
      backdrop-filter: blur(12px);
      padding: 0 48px;
      height: 64px;
      display: flex; align-items: center; gap: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      font-size: 26px; font-weight: 700; letter-spacing: -1px;
      color: #e50914;
    }
    .nav { display: flex; gap: 24px; }
    .nav a {
      color: #aaa; text-decoration: none; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: color 0.2s;
    }
    .nav a:hover, .nav a.active { color: white; }

    /* ── Layout ──────────────────────────────────────────────── */
    .app { display: flex; margin-top: 64px; height: calc(100vh - 64px); }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: 300px; background: #1a1a1a; border-right: 1px solid #2a2a2a;
      padding: 24px 20px; overflow-y: auto; flex-shrink: 0;
    }
    .sidebar-section { margin-bottom: 24px; }
    .sidebar-label {
      font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 10px;
    }
    .sidebar select, .sidebar input[type="text"] {
      width: 100%; padding: 10px 14px; background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 6px; color: #e5e5e5; font-size: 13px; font-family: inherit;
      transition: border-color 0.2s;
    }
    .sidebar select:focus, .sidebar input:focus { border-color: #e50914; outline: none; }
    .sidebar select option { background: #2a2a2a; }
    .file-drop {
      border: 2px dashed #3a3a3a; border-radius: 10px; padding: 28px 16px;
      text-align: center; cursor: pointer; transition: all 0.2s;
      background: rgba(229,9,20,0.03);
    }
    .file-drop:hover { border-color: #e50914; background: rgba(229,9,20,0.08); }
    .file-drop-icon { font-size: 28px; margin-bottom: 8px; }
    .file-drop-text { font-size: 13px; color: #888; }
    .file-drop-text b { color: #e50914; }
    .file-drop input { display: none; }

    .btn {
      width: 100%; padding: 11px 16px; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.2s; margin-bottom: 8px;
    }
    .btn-red { background: #e50914; color: white; }
    .btn-red:hover { background: #f40612; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(229,9,20,0.4); }
    .btn-red:disabled { background: #3a3a3a; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-dark { background: #2a2a2a; color: #ccc; border: 1px solid #3a3a3a; }
    .btn-dark:hover { background: #333; color: white; }

    .ep-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .ep-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: #2a2a2a; border: 1px solid #3a3a3a;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #ccc;
    }
    .ep-chip.done { border-color: #2ecc71; }
    .ep-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
    .ep-chip .dot.green { background: #2ecc71; }
    .ep-chip .dot.gray { background: #555; }

    .progress-bar { width: 100%; height: 3px; background: #2a2a2a; border-radius: 2px; margin: 8px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #e50914; border-radius: 2px; transition: width 0.3s; width: 0; }
    .progress-text { font-size: 11px; color: #666; }

    .divider { height: 1px; background: #2a2a2a; margin: 20px 0; }

    /* ── Main ────────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Tabs */
    .tab-bar { display: flex; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 0 24px; }
    .tab {
      padding: 14px 20px; font-size: 14px; font-weight: 500; color: #888;
      cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab:hover { color: #ccc; }
    .tab.active { color: white; border-bottom-color: #e50914; }

    .tab-content { flex: 1; overflow: hidden; display: none; }
    .tab-content.active { display: flex; }

    /* Scene list + detail */
    .scene-list {
      width: 45%; overflow-y: auto; padding: 20px; border-right: 1px solid #2a2a2a;
    }
    .scene-detail { width: 55%; overflow-y: auto; padding: 28px; background: #181818; }

    .scene-header { font-size: 14px; font-weight: 600; color: #aaa; margin-bottom: 16px; }
    .scene-header span { color: #e50914; }

    .scene-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 8px; cursor: pointer;
      margin-bottom: 4px; transition: all 0.15s;
      border: 1px solid transparent;
    }
    .scene-card:hover { background: #222; }
    .scene-card.selected { background: #1e1014; border-color: #e50914; }
    .scene-card .num { font-size: 12px; color: #666; min-width: 42px; }
    .scene-card .icon { font-size: 18px; }
    .scene-card .info { flex: 1; }
    .scene-card .loc { font-size: 13px; color: #ccc; }
    .scene-card .flags { font-size: 14px; display: flex; gap: 4px; }

    /* Annotation detail */
    .detail-empty { text-align: center; color: #555; padding: 80px 20px; font-size: 14px; }
    .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: white; }
    .detail-section { margin-bottom: 20px; }
    .detail-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    .detail-card {
      background: #222; border-radius: 8px; padding: 14px 16px;
      font-size: 14px; line-height: 1.7; color: #ddd;
    }
    .detail-reaction {
      background: linear-gradient(135deg, #1a2332, #1a1a2e);
      border-left: 3px solid #3498db; border-radius: 8px;
      padding: 14px 16px; font-size: 14px; color: #a8c8e8;
    }
    .detail-empathy {
      background: linear-gradient(135deg, #1a2e1a, #1a2e22);
      border-left: 3px solid #2ecc71; border-radius: 8px;
      padding: 14px 16px; font-size: 14px; color: #a8e8c8;
    }
    .detail-inflection {
      background: linear-gradient(135deg, #2e2a1a, #2e261a);
      border-left: 3px solid #f39c12; border-radius: 8px;
      padding: 14px 16px; font-size: 14px; color: #e8d8a8;
    }

    .love-badge {
      display: inline-block; padding: 4px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600; color: white;
    }
    .love-chars { font-size: 12px; color: #888; margin-top: 6px; }

    .viral-card {
      background: #222; border: 1px solid #333; border-radius: 8px;
      padding: 14px; margin-bottom: 8px; transition: border-color 0.2s;
    }
    .viral-card:hover { border-color: #e50914; }
    .viral-platform {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600; color: white;
    }
    .viral-type { font-size: 12px; color: #888; margin-left: 8px; }
    .viral-line { font-size: 15px; font-weight: 600; color: white; margin: 8px 0; }
    .viral-rationale { font-size: 12px; color: #777; line-height: 1.5; }

    /* ── Summary tab ─────────────────────────────────────────── */
    .summary-wrap { flex: 1; overflow: auto; padding: 32px; width: 100%; }

    .summary-table { width: 100%; border-collapse: separate; border-spacing: 4px; }
    .summary-table th {
      background: linear-gradient(135deg, #e50914, #b20710);
      color: white; padding: 14px 16px; border-radius: 6px;
      text-align: center; font-size: 15px; font-weight: 700;
    }
    .summary-table .row-label {
      background: #2a2a2a; color: #ccc; padding: 16px 12px; border-radius: 6px;
      text-align: center; font-size: 13px; font-weight: 600; min-width: 90px;
      vertical-align: middle;
    }
    .summary-table .row-label.romance { background: #3d1520; color: #e88; }
    .summary-table td {
      background: #1e1e1e; padding: 16px; border-radius: 6px;
      font-size: 13px; line-height: 1.7; color: #ccc; vertical-align: top;
    }
    .summary-table td.romance-cell { background: #1e1518; }
    .summary-table td b { color: #e50914; }
    .summary-table td.reaction-cell { font-size: 12px; color: #999; }

    /* ── Status bar ──────────────────────────────────────────── */
    .status-bar {
      padding: 8px 24px; background: #111; border-top: 1px solid #222;
      font-size: 12px; color: #555;
    }

    .empty-state { text-align: center; color: #555; padding: 80px 20px; }
    .empty-state .big { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; line-height: 1.8; }

    /* ep label input */
    .ep-label-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 12px; }
    .ep-label-row .fname { color: #666; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ep-label-row input {
      flex: 1; padding: 6px 10px; background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 4px; color: #e5e5e5; font-size: 12px; font-family: inherit;
    }

    /* ── Chat ────────────────────────────────────────────────── */
    .chat-container {
      display: flex; flex-direction: column; height: 100%; width: 100%;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 32px;
      max-width: 800px; margin: 0 auto; width: 100%;
    }
    .chat-welcome { text-align: center; padding: 80px 20px 40px; }
    .chat-welcome-icon { font-size: 48px; margin-bottom: 16px; }
    .chat-welcome-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 8px; }
    .chat-welcome-sub { font-size: 14px; color: #888; margin-bottom: 32px; }
    .chat-examples { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .chat-example {
      background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 20px;
      padding: 10px 18px; font-size: 13px; color: #ccc; cursor: pointer;
      transition: all 0.2s;
    }
    .chat-example:hover { border-color: #e50914; color: white; background: #1e1014; }

    .chat-bubble {
      max-width: 85%; padding: 14px 18px; border-radius: 16px;
      font-size: 14px; line-height: 1.7; margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .chat-bubble.user {
      background: #e50914; color: white; margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble.bot {
      background: #2a2a2a; color: #ddd;
      border-bottom-left-radius: 4px;
    }
    .chat-bubble.bot .scene-ref { color: #e50914; font-weight: 600; }
    .chat-bubble.thinking {
      background: #2a2a2a; color: #888; font-style: italic;
    }

    .chat-input-area {
      padding: 16px 32px; border-top: 1px solid #2a2a2a;
      display: flex; gap: 10px; max-width: 800px; margin: 0 auto; width: 100%;
    }
    .chat-input {
      flex: 1; padding: 12px 18px; background: #2a2a2a; border: 1px solid #3a3a3a;
      border-radius: 24px; color: #e5e5e5; font-size: 14px; font-family: inherit;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: #e50914; outline: none; }
    .chat-send {
      padding: 12px 24px; background: #e50914; color: white; border: none;
      border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .chat-send:hover { background: #f40612; }
    .chat-send:disabled { background: #3a3a3a; color: #666; cursor: not-allowed; }

    /* ── Mobile toggle ──────────────────────────────────────── */
    .mobile-sidebar-toggle {
      display: none; position: fixed; bottom: 20px; right: 20px; z-index: 200;
      width: 52px; height: 52px; border-radius: 50%; background: #e50914;
      color: white; border: none; font-size: 22px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(229,9,20,0.5);
    }
    .mobile-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 149;
    }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .header { padding: 0 16px; gap: 16px; height: 56px; }
      .logo { font-size: 20px; }
      .nav { gap: 14px; }
      .nav a { font-size: 12px; }

      .app { flex-direction: column; margin-top: 56px; height: calc(100vh - 56px); }

      /* Sidebar → slide-in drawer */
      .sidebar {
        position: fixed; top: 56px; left: 0; bottom: 0; width: 280px;
        z-index: 150; transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .mobile-sidebar-toggle { display: block; }
      .mobile-overlay.open { display: block; }

      .main { flex: 1; overflow: hidden; }

      /* Tab bar scroll */
      .tab-bar { padding: 0 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .tab { padding: 12px 14px; font-size: 13px; white-space: nowrap; }

      /* Scene tab → stacked */
      #tab-scenes { flex-direction: column; }
      .scene-list { width: 100%; border-right: none; border-bottom: 1px solid #2a2a2a; max-height: 45%; padding: 12px; }
      .scene-detail { width: 100%; flex: 1; padding: 16px; }
      .scene-card { padding: 10px 12px; }
      .scene-card .loc { font-size: 12px; }
      .detail-title { font-size: 17px; }

      /* Summary → horizontal scroll */
      .summary-wrap { padding: 16px; }
      .summary-table { min-width: 600px; }
      .summary-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* Chat */
      .chat-messages { padding: 16px; }
      .chat-welcome { padding: 40px 16px 24px; }
      .chat-welcome-title { font-size: 18px; }
      .chat-examples { gap: 8px; }
      .chat-example { padding: 8px 14px; font-size: 12px; }
      .chat-input-area { padding: 12px 16px; }
      .chat-input { padding: 10px 14px; font-size: 13px; }
      .chat-send { padding: 10px 18px; font-size: 13px; }
      .chat-bubble { max-width: 90%; padding: 12px 14px; font-size: 13px; }

      /* Status bar */
      .status-bar { padding: 6px 16px; font-size: 11px; }

      /* Empty state */
      .empty-state { padding: 40px 16px; }
      .empty-state .big { font-size: 36px; }
    }

    @media (max-width: 380px) {
      .header { gap: 10px; }
      .nav a { font-size: 11px; }
      .logo { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">Scriptor</div>
  <div class="nav">
    <a class="active" onclick="switchTab('scenes')">씬 분석</a>
    <a onclick="switchTab('summary')">회차별 요약</a>
    <a onclick="switchTab('chat')">질문하기</a>
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">장르</div>
      <select id="genre">
        <option value="오피스 로맨스 코미디">오피스 로맨스 코미디</option>
        <option value="수사물">수사물</option>
        <option value="로맨스">로맨스</option>
      </select>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">에피소드 업로드</div>
      <div class="file-drop" onclick="document.getElementById('pdfFiles').click()">
        <div class="file-drop-icon">📄</div>
        <div class="file-drop-text"><b>클릭</b>하여 PDF 업로드<br>여러 화 동시 가능</div>
        <input type="file" id="pdfFiles" accept=".pdf" multiple />
      </div>
      <div id="epLabels"></div>
      <button class="btn btn-dark" id="parseBtn" onclick="parsePDFs()" style="margin-top:10px;">대본 파싱</button>
    </div>

    <div class="divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">에피소드</div>
      <div id="epChips" class="ep-chips"></div>
      <select id="epSelector" onchange="switchEpisode()" style="margin-top:6px;"></select>
    </div>

    <div class="sidebar-section">
      <button class="btn btn-red" id="analyzeBtn" onclick="analyzeScenes()" disabled>씬 분석 시작</button>
      <div class="progress-bar" id="analyzeProgress" style="display:none"><div class="progress-fill" id="analyzeFill"></div></div>
      <div class="progress-text" id="analyzeStatus"></div>
    </div>

    <div class="divider"></div>

    <div class="sidebar-section">
      <button class="btn btn-red" id="summaryBtn" onclick="generateSummary()" disabled>회차 요약 생성</button>
    </div>

  </div>

  <!-- Main -->
  <div class="main">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('scenes')">씬 분석</div>
      <div class="tab" onclick="switchTab('summary')">회차별 요약</div>
      <div class="tab" onclick="switchTab('chat')">💬 질문하기</div>
    </div>

    <div class="tab-content active" id="tab-scenes">
      <div class="scene-list" id="sceneList">
        <div class="empty-state">
          <div class="big">🎬</div>
          <p>대본을 업로드하고<br>파싱 버튼을 눌러주세요</p>
        </div>
      </div>
      <div class="scene-detail" id="sceneDetail">
        <div class="detail-empty">씬을 선택하면 분석 결과가 표시됩니다</div>
      </div>
    </div>

    <div class="tab-content" id="tab-summary">
      <div class="summary-wrap" id="summaryContent">
        <div class="empty-state">
          <div class="big">📊</div>
          <p>씬 분석 완료 후<br>회차 요약을 생성하세요</p>
        </div>
      </div>
    </div>

    <!-- Chat tab -->
    <div class="tab-content" id="tab-chat">
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="chat-welcome">
            <div class="chat-welcome-icon">💬</div>
            <div class="chat-welcome-title">대본에 대해 물어보세요</div>
            <div class="chat-welcome-sub">분석된 데이터를 기반으로 답변합니다</div>
            <div class="chat-examples">
              <div class="chat-example" onclick="askExample(this)">키스신은 몇화에 나오나요?</div>
              <div class="chat-example" onclick="askExample(this)">주인공이 처음 만나는 씬은?</div>
              <div class="chat-example" onclick="askExample(this)">바이럴 될 만한 장면 알려줘</div>
              <div class="chat-example" onclick="askExample(this)">가장 공감되는 직장인 씬은?</div>
            </div>
          </div>
        </div>
        <div class="chat-input-area">
          <input type="text" id="chatInput" class="chat-input" placeholder="질문을 입력하세요..." onkeydown="if(event.key==='Enter')sendChat()" />
          <button class="chat-send" onclick="sendChat()" id="chatSendBtn">전송</button>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="mobile-sidebar-toggle" id="mobileToggle" onclick="toggleSidebar()">☰</button>
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>
<div class="status-bar" id="statusBar">Scriptor — Ready</div>

<input type="hidden" id="apiKey" value="" />

<script>
const state = {
  episodes: {},
  summaries: {},
  currentEpisode: null,
  selectedScene: null,
};

const ICONS = {
  romance_beat:'💕', office_moment:'💼', comedy_beat:'😄', case_open:'🔍',
  investigation:'🔎', confrontation:'⚡', reveal:'💡', conflict:'💢',
  resolution:'🤝', error:'⚠️', other:'📝'
};
const LOVE_COLORS = {
  '첫 접점':'#FF6B9D','감정 인식':'#FF8E53','밀당':'#FFC300','갈등':'#E74C3C',
  '화해':'#2ECC71','고백':'#9B59B6','결합':'#E91E63','해당없음':'#555'
};
const PLAT_COLORS = { instagram:'#E1306C', youtube:'#FF0000', tiktok:'#fff' };

// ── Tabs ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  const tabs = ['scenes','summary','chat'];
  const idx = tabs.indexOf(tab);
  document.querySelectorAll('.tab')[idx]?.classList.add('active');
  document.querySelectorAll('.nav a')[idx]?.classList.add('active');
}

// ── File labels ─────────────────────────────────────────────────────────────
document.getElementById('pdfFiles').addEventListener('change', function() {
  const c = document.getElementById('epLabels');
  c.innerHTML = '';
  Array.from(this.files).forEach((f, i) => {
    const name = f.name.replace('.pdf','');
    const div = document.createElement('div');
    div.className = 'ep-label-row';
    div.innerHTML = `<span class="fname">${f.name}</span>
      <input type="text" value="${name}" id="epLabel_${i}" placeholder="에피소드 이름" />`;
    c.appendChild(div);
  });
});

// ── Parse ───────────────────────────────────────────────────────────────────
async function parsePDFs() {
  const files = document.getElementById('pdfFiles').files;
  if (!files.length) return;
  const btn = document.getElementById('parseBtn');
  btn.disabled = true; btn.textContent = '파싱 중...';
  setStatus('파싱 중...');

  for (let i = 0; i < files.length; i++) {
    const label = document.getElementById(`epLabel_${i}`)?.value || files[i].name;
    const fd = new FormData();
    fd.append('pdf', files[i]);
    try {
      const res = await fetch('/api/parse', { method:'POST', body: fd });
      const data = await res.json();
      state.episodes[label] = { scenes: data.scenes, annotations: {}, done: false };
      setStatus(`✅ ${label}: ${data.total_scenes}개 씬`);
    } catch(e) { alert(`파싱 실패: ${e.message}`); }
  }

  const eps = Object.keys(state.episodes);
  if (eps.length) {
    state.currentEpisode = eps[0];
    state.selectedScene = state.episodes[eps[0]].scenes[0]?.scene_id;
  }
  btn.disabled = false; btn.textContent = '대본 파싱';
  updateUI();
}

// ── Analyze ─────────────────────────────────────────────────────────────────
async function analyzeScenes() {
  const genre = document.getElementById('genre').value;
  const ep = state.currentEpisode;
  if (!ep) return;

  const epData = state.episodes[ep];
  epData.annotations = {}; epData.done = false;

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('analyzeProgress').style.display = 'block';

  const total = epData.scenes.length;
  for (let i = 0; i < total; i++) {
    const scene = epData.scenes[i];
    setStatus(`분석 중... ${i+1}/${total} — ${scene.scene_id}`);
    document.getElementById('analyzeFill').style.width = `${((i+1)/total)*100}%`;
    document.getElementById('analyzeStatus').textContent = `${i+1} / ${total}`;

    try {
      const res = await fetch('/api/analyze', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ scene, genre, api_key: '' }),
      });
      const ann = await res.json();
      epData.annotations[scene.scene_id] = ann;
      if (i === 0) state.selectedScene = scene.scene_id;
      renderSceneList();
      if (scene.scene_id === state.selectedScene) renderAnnotation(ann);
    } catch(e) {
      epData.annotations[scene.scene_id] = { scene_id:scene.scene_id, scene_type:'error', summary:`에러: ${e.message}`, _error:true };
    }
  }

  epData.done = true;
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('analyzeProgress').style.display = 'none';
  setStatus(`✅ ${ep} — ${total}개 씬 분석 완료`);
  updateUI();
}

// ── Summary ─────────────────────────────────────────────────────────────────
async function generateSummary() {
  const btn = document.getElementById('summaryBtn');
  btn.disabled = true; btn.textContent = '생성 중...';

  const doneEps = Object.entries(state.episodes).filter(([_,d]) => d.done).map(([ep]) => ep).sort();
  for (const ep of doneEps) {
    setStatus(`${ep} 요약 중...`);
    const anns = Object.values(state.episodes[ep].annotations);
    try {
      const res = await fetch('/api/summary', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ episode:ep, annotations:anns, api_key:'' }),
      });
      state.summaries[ep] = await res.json();
    } catch(e) {
      state.summaries[ep] = { episode:ep, character_events:`실패: ${e.message}`, romance:'', expected_reactions:[], _error:true };
    }
  }

  btn.disabled = false; btn.textContent = '회차 요약 생성';
  setStatus('✅ 요약 완료');
  renderSummaryTable();
  switchTab('summary');
}

// ── Render scene list ───────────────────────────────────────────────────────
function renderSceneList() {
  const ep = state.currentEpisode;
  if (!ep || !state.episodes[ep]) return;
  const { scenes, annotations } = state.episodes[ep];
  const nDone = Object.keys(annotations).length;
  const nViral = Object.values(annotations).filter(a => a.viral_candidates?.length).length;

  let html = `<div class="scene-header">${ep} — <span>${nDone}</span>/${scenes.length}개 완료 · 🔥 ${nViral}</div>`;
  for (const s of scenes) {
    const ann = annotations[s.scene_id];
    let icon = '⬜';
    if (ann) icon = ann._error ? '❌' : (ICONS[ann.scene_type] || '📝');
    let flags = '';
    if (ann?.viral_candidates?.length) flags += '🔥';
    if (ann?.love_line_status && ann.love_line_status !== '해당없음') flags += '💕';
    const sel = state.selectedScene === s.scene_id ? 'selected' : '';
    html += `<div class="scene-card ${sel}" onclick="selectScene('${s.scene_id}')">
      <span class="icon">${icon}</span>
      <div class="info"><span class="loc">${s.scene_id}. ${s.location}</span></div>
      <span class="flags">${flags}</span>
    </div>`;
  }
  document.getElementById('sceneList').innerHTML = html;
}

function selectScene(sid) {
  state.selectedScene = sid;
  renderSceneList();
  renderAnnotation(state.episodes[state.currentEpisode]?.annotations[sid]);
}

// ── Render annotation ───────────────────────────────────────────────────────
function renderAnnotation(ann) {
  const el = document.getElementById('sceneDetail');
  if (!ann) { el.innerHTML = '<div class="detail-empty">씬을 선택하면 분석 결과가 표시됩니다</div>'; return; }
  if (ann._error) { el.innerHTML = `<div style="color:#e50914;padding:40px;">${ann.summary}</div>`; return; }

  const icon = ICONS[ann.scene_type] || '📝';
  let h = `<div class="detail-title">${icon} ${ann.scene_id} — ${ann.location || ''}</div>`;

  h += `<div class="detail-section"><div class="detail-label">줄거리</div><div class="detail-card">${ann.summary || ''}</div></div>`;
  h += `<div class="detail-section"><div class="detail-label">시청자 반응</div><div class="detail-reaction">${ann.audience_reaction || ''}</div></div>`;

  if (ann.love_line_status && ann.love_line_status !== '해당없음') {
    const c = LOVE_COLORS[ann.love_line_status] || '#555';
    h += `<div class="detail-section"><div class="detail-label">애정 전선</div>
      <span class="love-badge" style="background:${c}">${ann.love_line_status}</span>`;
    if (ann.characters_involved?.length) h += `<div class="love-chars">${ann.characters_involved.join(' · ')}</div>`;
    h += `</div>`;
  }
  if (ann.empathy_point) h += `<div class="detail-section"><div class="detail-label">직장인 공감 포인트</div><div class="detail-empathy">${ann.empathy_point}</div></div>`;
  if (ann.inflection_point) h += `<div class="detail-section"><div class="detail-label">캐릭터 변곡점</div><div class="detail-inflection">${ann.inflection_point}</div></div>`;

  if (ann.viral_candidates?.length) {
    h += `<div class="detail-section"><div class="detail-label">바이럴 후보</div>`;
    for (const v of ann.viral_candidates) {
      const pc = PLAT_COLORS[v.platform] || '#555';
      const platBg = v.platform === 'tiktok' ? 'background:#000;color:#fff;' : `background:${pc};`;
      h += `<div class="viral-card">
        <span class="viral-platform" style="${platBg}">${v.platform}</span>
        <span class="viral-type">${v.clip_type}</span>
        <div class="viral-line">"${v.line_or_description}"</div>
        <div class="viral-rationale">${v.rationale}</div>
      </div>`;
    }
    h += `</div>`;
  }
  el.innerHTML = h;
}

// ── Summary table ───────────────────────────────────────────────────────────
function renderSummaryTable() {
  const eps = Object.keys(state.summaries).sort();
  if (!eps.length) { document.getElementById('summaryContent').innerHTML = '<div class="empty-state"><div class="big">📊</div><p>요약 없음</p></div>'; return; }

  let h = '<table class="summary-table"><thead><tr><th></th>';
  for (const ep of eps) h += `<th>${ep}</th>`;
  h += '</tr></thead><tbody>';

  h += '<tr><td class="row-label">주요 캐릭터<br>사건</td>';
  for (const ep of eps) h += `<td>${(state.summaries[ep].character_events||'—').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}</td>`;
  h += '</tr>';

  h += '<tr><td class="row-label romance">로맨스<br>전개</td>';
  for (const ep of eps) h += `<td class="romance-cell">${(state.summaries[ep].romance||'—').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}</td>`;
  h += '</tr>';

  h += '<tr><td class="row-label">예상<br>반응</td>';
  for (const ep of eps) {
    const r = (state.summaries[ep].expected_reactions||[]).map(x => `"${x}"`).join('<br>');
    h += `<td class="reaction-cell">${r||'—'}</td>`;
  }
  h += '</tr></tbody></table>';
  document.getElementById('summaryContent').innerHTML = h;
}

// ── Episode switch ──────────────────────────────────────────────────────────
function switchEpisode() {
  const ep = document.getElementById('epSelector').value;
  if (!ep) return;
  state.currentEpisode = ep;
  state.selectedScene = state.episodes[ep]?.scenes[0]?.scene_id || null;
  renderSceneList();
  renderAnnotation(null);
}

// ── UI update ───────────────────────────────────────────────────────────────
function updateUI() {
  const eps = Object.keys(state.episodes).sort();
  const sel = document.getElementById('epSelector');
  sel.innerHTML = eps.map(ep => `<option value="${ep}" ${ep===state.currentEpisode?'selected':''}>${ep}</option>`).join('');

  const chips = document.getElementById('epChips');
  chips.innerHTML = eps.map(ep => {
    const done = state.episodes[ep].done;
    return `<span class="ep-chip ${done?'done':''}"><span class="dot ${done?'green':'gray'}"></span>${ep}</span>`;
  }).join('');

  document.getElementById('analyzeBtn').disabled = !state.currentEpisode;
  document.getElementById('summaryBtn').disabled = !Object.values(state.episodes).some(d => d.done);
  renderSceneList();
}

function setStatus(t) { document.getElementById('statusBar').textContent = `Scriptor — ${t}`; }

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('open');
}

// ── Chat ────────────────────────────────────────────────────────────────────
function askExample(el) {
  document.getElementById('chatInput').value = el.textContent;
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  if (!question) return;

  const hasData = Object.values(state.episodes).some(d => Object.keys(d.annotations).length > 0);
  if (!hasData) {
    alert('먼저 씬 분석을 완료해주세요.');
    return;
  }

  const msgBox = document.getElementById('chatMessages');

  // Hide welcome
  const welcome = msgBox.querySelector('.chat-welcome');
  if (welcome) welcome.style.display = 'none';

  // User bubble
  msgBox.innerHTML += `<div class="chat-bubble user">${escapeHtml(question)}</div>`;
  input.value = '';
  document.getElementById('chatSendBtn').disabled = true;

  // Thinking bubble
  const thinkId = 'think_' + Date.now();
  msgBox.innerHTML += `<div class="chat-bubble thinking" id="${thinkId}">답변 생성 중...</div>`;
  msgBox.scrollTop = msgBox.scrollHeight;

  // Build episodes data
  const episodes = {};
  for (const [ep, d] of Object.entries(state.episodes)) {
    episodes[ep] = Object.values(d.annotations);
  }

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, episodes, summaries: state.summaries, api_key: '' }),
    });
    const data = await res.json();
    const thinkEl = document.getElementById(thinkId);

    if (data.error) {
      thinkEl.className = 'chat-bubble bot';
      thinkEl.innerHTML = `오류: ${data.error}`;
    } else {
      thinkEl.className = 'chat-bubble bot';
      thinkEl.innerHTML = formatAnswer(data.answer);
    }
  } catch (e) {
    const thinkEl = document.getElementById(thinkId);
    thinkEl.className = 'chat-bubble bot';
    thinkEl.innerHTML = `오류: ${e.message}`;
  }

  document.getElementById('chatSendBtn').disabled = false;
  msgBox.scrollTop = msgBox.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatAnswer(text) {
  // Bold S# references
  text = escapeHtml(text);
  text = text.replace(/(S#\d+)/g, '<span class="scene-ref">$1</span>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  text = text.replace(/\n/g, '<br>');
  return text;
}
